name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "infra/**"
      - "docker/**"
      - "README.md"
      - ".dockerignore"
      - ".nvmrc"
      - "run.sh"
      - "docker-compose.yml"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload build to S3
        run: aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/${{ github.sha }}/
