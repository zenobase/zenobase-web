server {
    listen 80;
    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;

    location / {
        try_files $uri /index.html;
    }

    location /admin/ {
        try_files $uri /admin/index.html;
    }

    location /localauth0/ {
        proxy_pass http://host.docker.internal:3000/;
    }
}
