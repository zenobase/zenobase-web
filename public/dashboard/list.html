<div id="{{settings.id}}-content" data-ng-controller="ListWidgetController">

	<form class="form-search">
		<div class="input-append">
			<input type="text" class="search-query input-large" data-ng-model="filter.value" data-ng-model-options="{ debounce: 500 }" data-ui-blur-on-enter 
				placeholder="search in {{filter.field.label}}"
			/>
			<div class="btn-group">
				<button class="btn dropdown-toggle" title="Field" data-toggle="dropdown">
					<i class="fa" data-ng-class="filter.field.icon"></i>
					<span class="caret"></span>
				</button>
				<button class="btn" title="Clear" data-ng-click="filter.clear()"><i class="fa fa-close"></i></button>
				<ul class="dropdown-menu" role="menu">
					<li role="presentation" data-ng-repeat="field in filter.fields">
						<a role="menuitem" data-ng-click="filter.field = field"><i class="fa" data-ng-class="field.icon"></i> &nbsp; {{field.label}}</a>
					</li>
				</ul>
			</div>
		</div>
		<div class="pull-right">
			<button class="xbtn" title="Filter" data-ng-click="applyFilter()" data-ng-disabled="!filter.value"><i class="fa fa-filter"></i></button>
		</div>
	</form>

	<table class="table" data-ng-show="items.length">
		<tbody>
			<tr class="event-row" data-ng-repeat="event in items">
				<td style="line-height: 1.5; border-style: none;">
					<span data-ui-bind-event="event"></span>
					&nbsp;
					<div class="action pull-right" data-ng-show="editable && !bucket.isVirtual()">
						<a class="event-edit-action" data-ng-click="openDialog('edit-event-dialog', event)"><i class="fa fa-pencil" title="Edit"></i></a>
						<a class="event-delete-action" data-ng-click="removeEvent(event['@id'])"><i class="fa fa-trash-o" title="Delete"></i></a>
					</div>
				</td>
			</tr>
		</tbody>
	</table>

	<p data-ng-show="items == null" class="none">Loading...</p>

	<p data-ng-show="items.length == 0" class="none">None</p>

	<div class="btn-toolbar" data-ng-show="items.length">
		<div class="btn-group pull-right">
			<button class="btn" title="Previous" data-ng-click="prev()" data-ng-disabled="!hasPrev()"><i class="fa fa-chevron-left"></i></button>
			<button class="btn" title="Next" data-ng-click="next()" data-ng-disabled="!hasNext()"><i class="fa fa-chevron-right"></i></button>
		</div>
		<div class="btn-group pull-right">
			<button class="btn disabled zeno-paging"><b>{{offset + 1}}</b> &ndash; <b>{{offset + items.length}}</b> of <b>{{total | number }}</b></button>
		</div>
	</div>

	<div data-ui-modal="settings.id + '-dialog'" data-ng-controller="ListWidgetDialogController">
		<form name="form" class="modal-form">
			<div class="modal-header">
				<a class="close" data-dismiss="modal">&times;</a>
				<h4>List Widget</h4>
			</div>
			<div class="modal-body">
				<div class="control-group">
					<label class="control-label" for="label">Title</label>
					<div class="controls form-horizontal">
						<input name="label" type="text" required min="1" max="20" data-ng-model="settings.label"/>
					</div>
				</div>
				<div class="control-group">
					<label class="control-label" for="limit">Limit</label>
					<div class="controls form-horizontal">
						<input name="limit" type="number" required min="1" max="100" data-ng-model="settings.limit"/>
					</div>
				</div>
				<div class="control-group">
					<label class="control-label" for="order">Order</label>
					<div class="controls form-horizontal">
						<select required data-ng-model="order" data-ng-model-options="{ getterSetter: true }" data-ng-options="field for field in orderBy" class="input-medium"></select>
						<select required data-ng-model="asc" data-ng-model-options="{ getterSetter: true }" data-ng-options="value as label for (label, value) in ascDesc" class="input-small"></select>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<a class="pull-left" data-ng-click="removeWidget(settings)" data-dismiss="modal">Remove</a>
				<button class="btn btn-primary" data-ng-click="save()" data-ng-disabled="!form.$valid">Update</button>
				<button class="btn" data-dismiss="modal">Cancel</button>
			</div>
		</form>
	</div>

</div>
