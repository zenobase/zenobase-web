<div id="{{settings.id}}-content" data-ng-controller="RatingsWidgetController">

	<table class="table" data-ng-show="ratings.length">
		<thead>
			<tr>
				<th>Rating</th>
				<th style="text-align: right">Count</th>
			</tr>
		</thead>
		<tbody>
			<tr data-ng-repeat="rating in ratings">
				<td>
					<a data-ng-click="filter(rating)" data-ng-bind-html="rating.from | stars"></a>
				</td>
				<td style="text-align: right">{{rating.count | number }}</td>
			</tr>
			<tr data-ng-hide="ratings">
				<td colspan="2"><i>None</i></td>
			</tr>
		</tbody>
	</table>

	<p data-ng-show="ratings == null" class="none">Loading...</p>

	<p data-ng-show="ratings.length == 0" class="none">None</p>

	<div class="btn-toolbar">
		<div class="btn-group"></div>
	</div>

	<div data-ui-modal="settings.id + '-dialog'" data-ng-controller="RatingsWidgetDialogController">
		<form name="form" class="modal-form">
			<div class="modal-header">
				<a class="close" data-dismiss="modal">&times;</a>
				<h4>Ratings Widget</h4>
			</div>
			<div class="modal-body">
				<div class="control-group">
					<label class="control-label" for="label">Title</label>
					<div class="controls form-horizontal">
						<input name="label" type="text" required min="1" max="20" data-ng-model="settings.label"/>
					</div>
				</div>
				<div class="control-group">
					<label class="control-label" for="filter">Filter</label>
					<div class="controls form-horizontal input-append">
						<input name="filter" type="text" data-ng-model="settings.filter" data-ui-check-filter="bucket" placeholder="e.g. tag:xyz"/>
						<span class="add-on">
							<i class="fa fa-exclamation" title="not valid" data-ng-show="form.filter.$invalid"></i>
							<i class="fa fa-check" title="valid" data-ng-hide="form.filter.$invalid"></i>
						</span>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<a class="pull-left" data-ng-click="removeWidget(settings)" data-dismiss="modal">Remove</a>
				<button class="btn btn-primary" data-ng-click="save()" data-ng-disabled="!form.$valid">Update</button>
				<button class="btn" data-dismiss="modal">Cancel</button>
			</div>
		</form>
	</div>

</div>
