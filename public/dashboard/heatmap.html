<div id="{{settings.id}}-content" data-ng-controller="HeatmapWidgetController">

	<div id="{{settings.id}}-map" style="height: 350px" class="map" data-ng-show="!bounds.isEmpty() || !boundsB.isEmpty()"></div>

	<p data-ng-show="bounds == null" class="none">Loading...</p>

	<p data-ng-show="bounds.isEmpty() && boundsB.isEmpty()" class="none">None</p>

	<div class="btn-toolbar">
		<div class="btn-group"></div>
	</div>

	<div data-ui-modal="settings.id + '-dialog'" data-ng-controller="HeatmapWidgetDialogController">
		<form name="form" class="modal-form">
			<div class="modal-header">
				<a class="close" data-dismiss="modal">&times;</a>
				<h4>Heatmap Widget</h4>
			</div>
			<div class="modal-body">
				<div class="control-group">
					<label class="control-label" for="label">Title</label>
					<div class="controls">
						<input name="label" type="text" required min="1" max="20" data-ng-model="settings.label"/>
					</div>
				</div>
				<div class="control-group">
					<label class="control-label" for="valueField">Values</label>
					<div class="controls form-horizontal">
						<select name="valueField" class="input-medium" data-ng-model="settings.value_field" data-ng-options="field.name as field.name for field in getFields()">
							<option value=""></option>
						</select>
						<p class="help-block">Optional field to use for calculating the weight of each point.</p>
					</div>
				</div>
				<div class="control-group">
					<label class="control-label" for="filter">Filter</label>
					<div class="controls form-horizontal input-append">
						<input name="filter" type="text" data-ng-model="settings.filter" data-ui-check-filter="bucket" placeholder="e.g. tag:xyz"/>
						<span class="add-on">
							<i class="fa fa-exclamation" title="not valid" data-ng-show="form.filter.$invalid"></i>
							<i class="fa fa-check" title="valid" data-ng-hide="form.filter.$invalid"></i>
						</span>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<a class="pull-left" data-ng-click="removeWidget(settings)" data-dismiss="modal">Remove</a>
				<button class="btn btn-primary" data-ng-click="save()" data-ng-disabled="!form.$valid">Update</button>
				<button class="btn" data-dismiss="modal">Cancel</button>
			</div>
		</form>
	</div>

</div>
